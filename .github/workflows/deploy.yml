name: 🌾 Deploy TelAgri Bank Dashboard

# This workflow:
# - On PULL REQUEST: Only runs build, lint, test, and security scan (no deployment)
# - On PUSH (merge): Runs full pipeline including deployment to AWS  
# - On MANUAL: Allows manual deployment to any environment

on:
  push:
    branches:
      - main
      - develop 
      - staging
  pull_request:
    branches:
      - main
      - develop
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Build and test the frontend
  build:
    name: 🏗️ Build PWA
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📥 Install dependencies
        run: bun install

      - name: 🔍 Lint code
        run: bun run lint

      - name: 🏗️ Build PWA
        run: bun run build

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Determine deployment environment
  environment:
    name: 🎯 Determine Environment
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.env.outputs.env }}
      domain: ${{ steps.env.outputs.domain }}
    
    steps:
      - name: 🎯 Set environment
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="prod"
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            ENV="staging"
          else
            ENV="dev"
          fi
          
          echo "env=${ENV}" >> $GITHUB_OUTPUT
          
          case ${ENV} in
            prod)
              echo "domain=dashboard.telagri.com" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "domain=bank-staging.telagri.com" >> $GITHUB_OUTPUT
              ;;
            dev)
              echo "domain=bank-dev.telagri.com" >> $GITHUB_OUTPUT
              ;;
          esac
          
          echo "🎯 Deploying to: ${ENV}"
          echo "🌐 Domain: $(cat $GITHUB_OUTPUT | grep domain | cut -d= -f2)"

  # Run database migrations
  migrate:
    name: 🗄️ Run DB Migrations
    runs-on: ubuntu-latest
    needs: [build, environment]
    environment: ${{ needs.environment.outputs.env }}
    # Only run migrations on push events (when PRs are merged), not on pull_request events
    if: github.event_name != 'pull_request'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📥 Install dependencies
        run: bun install

      - name: 🔧 Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🗄️ Run database migrations (Direct URL method)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "🗄️ Running database migrations using direct URL method..."
          echo "Project ID: $SUPABASE_PROJECT_ID"
          echo "Access Token: ${SUPABASE_ACCESS_TOKEN:+Set}${SUPABASE_ACCESS_TOKEN:-Not Set}"
          echo "DB Password: ${SUPABASE_DB_PASSWORD:+Set}${SUPABASE_DB_PASSWORD:-Not Set}"
          
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "❌ SUPABASE_DB_PASSWORD is not set!"
            echo "Please add SUPABASE_DB_PASSWORD to GitHub repository secrets"
            exit 1
          fi
          
          # Construct database URL
          DB_URL="postgresql://postgres.$(echo $SUPABASE_PROJECT_ID):${SUPABASE_DB_PASSWORD}@aws-1-us-east-2.pooler.supabase.com:6543/postgres"
          echo "🔗 Using direct database URL connection..."
          
          # Run migrations using direct URL with retry logic
          echo "📋 Checking current migration status..."
          
          # Retry function for database operations
          retry_command() {
            local cmd="$1"
            local max_attempts=3
            local attempt=1
            
            while [ $attempt -le $max_attempts ]; do
              echo "Attempt $attempt/$max_attempts: $cmd"
              
              # Capture both stdout and stderr
              local output
              if output=$(eval "$cmd" 2>&1); then
                echo "✅ Command succeeded on attempt $attempt"
                echo "$output"
                return 0
              else
                echo "❌ Command failed on attempt $attempt"
                echo "$output"
                
                # Check for specific "up to date" messages
                if echo "$output" | grep -q "Remote database is up to date"; then
                  echo "✅ Database is already up to date - treating as success"
                  return 0
                fi
                
                # Check for prepared statement errors that might indicate up-to-date database
                if echo "$output" | grep -q "prepared statement.*already exists"; then
                  echo "⚠️ Prepared statement conflict detected"
                  # For db push commands, this typically means database is already up to date
                  if echo "$cmd" | grep -q "db push"; then
                    echo "✅ Database is already up to date - treating prepared statement conflict as success"
                    return 0
                  # For migration list commands, also treat as success since connection is working
                  elif echo "$cmd" | grep -q "migration list"; then
                    echo "✅ Migration list connection works despite prepared statement conflict - treating as success"
                    return 0
                  else
                    echo "⚠️ Prepared statement conflict in other command - continuing retry..."
                  fi
                fi
                
                if [ $attempt -eq $max_attempts ]; then
                  echo "🚨 All attempts failed"
                  return 1
                fi
                echo "⏳ Waiting 5 seconds before retry..."
                sleep 5
                attempt=$((attempt + 1))
              fi
            done
          }
          
          # Check migration status with retry
          # Check migration status with retry
          retry_command "supabase migration list --db-url '$DB_URL'"
          
          echo "🚀 Applying new migrations..."
          retry_command "supabase db push --db-url '$DB_URL'"
          
          echo "✅ Migrations completed successfully!"
          
          echo "📊 Final migration status:"
          retry_command "supabase migration list --db-url '$DB_URL'"

          echo ""
          echo "🔧 Deploying Supabase Edge Functions..."
          
          # Enhanced retry function for Edge Functions with specific error handling
          retry_function_command() {
            local cmd="$1"
            local max_attempts=3
            local attempt=1
            
            while [ $attempt -le $max_attempts ]; do
              echo "Attempt $attempt/$max_attempts: $cmd"
              
              if output=$(eval "$cmd" 2>&1); then
                echo "✅ Edge Functions command succeeded on attempt $attempt"
                echo "$output"
                return 0
              else
                echo "❌ Edge Functions command failed on attempt $attempt"
                echo "$output"
                
                # Check for specific Edge Function error patterns
                if echo "$output" | grep -q "already exists\|up to date\|no changes"; then
                  echo "✅ Edge Functions are already up to date - treating as success"
                  return 0
                fi
                
                # Check for authentication/project issues
                if echo "$output" | grep -q "authentication\|project not found\|invalid project"; then
                  echo "🔐 Re-authenticating and retrying..."
                  supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD" 2>/dev/null || true
                fi
                
                if [ $attempt -eq $max_attempts ]; then
                  echo "🚨 All Edge Functions deployment attempts failed"
                  return 1
                fi
                
                echo "⏳ Waiting 10 seconds before retry..."
                sleep 10
                attempt=$((attempt + 1))
              fi
            done
          }
          
          # Link to Supabase project for Edge Functions deployment
          echo "🔗 Linking to Supabase project for Edge Functions..."
          retry_function_command "supabase link --project-ref '$SUPABASE_PROJECT_ID' --password '$SUPABASE_DB_PASSWORD'"
          
          # Check existing Edge Functions
          echo "📋 Checking existing Edge Functions..."
          retry_function_command "supabase functions list" || echo "No existing functions or list command failed"
          
          # Deploy all Edge Functions
          echo "🚀 Deploying all Edge Functions..."
          retry_function_command "supabase functions deploy --verify-jwt=false"
          
          # Verify deployment
          echo "✅ Verifying Edge Functions deployment..."
          retry_function_command "supabase functions list"
          
          echo "✅ Edge Functions deployment completed successfully!"

  # Deploy infrastructure with CDK
  deploy:
    name: 🚀 Deploy to AWS
    runs-on: ubuntu-latest
    needs: [build, environment, migrate]
    environment: ${{ needs.environment.outputs.env }}
    # Only deploy on push events (when PRs are merged), not on pull_request events
    if: github.event_name != 'pull_request'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📊 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🚀 Setup Bun (Full Stack)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ⚙️ Configure AWS credentials (Access Keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: 📦 Install CDK dependencies
        working-directory: cdk
        run: bun install

      - name: 🏗️ Build CDK
        working-directory: cdk
        run: bun run build

      - name: 🔍 CDK Diff
        working-directory: cdk
        env:
          ENVIRONMENT: ${{ needs.environment.outputs.env }}
          DOMAIN_NAME: ${{ needs.environment.outputs.domain }}
          CERTIFICATE_ARN: ${{ vars.CERTIFICATE_ARN }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          echo "🔍 Showing infrastructure changes..."
          bun run diff || true

      - name: 🚀 Deploy CDK Stack
        working-directory: cdk
        env:
          ENVIRONMENT: ${{ needs.environment.outputs.env }}
          DOMAIN_NAME: ${{ needs.environment.outputs.domain }}
          CERTIFICATE_ARN: ${{ vars.CERTIFICATE_ARN }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          echo "🚀 Deploying TelAgri Bank Dashboard to ${{ needs.environment.outputs.env }}..."
          bun run deploy

      - name: 📋 Get Stack Outputs
        working-directory: cdk
        env:
          ENVIRONMENT: ${{ needs.environment.outputs.env }}
        run: |
          echo "📋 Stack Outputs:"
          aws cloudformation describe-stacks \
            --stack-name "TelAgri-Bank-Dashboard-${{ needs.environment.outputs.env }}" \
            --query 'Stacks[0].Outputs' \
            --output table || true

      - name: ✅ Deployment Success
        run: |
          echo "🎉 TelAgri Bank Dashboard successfully deployed!"
          echo "🌐 URL: https://${{ needs.environment.outputs.domain }}"
          echo "🔧 Environment: ${{ needs.environment.outputs.env }}"
          echo "📊 Build: ${{ github.sha }}"

  # Security scan (runs on all events)
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    # Run security scan on all PRs and main branch pushes
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔒 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-results.txt'

      - name: 📊 Display security scan results
        if: always()
        run: |
          echo "🔒 Security Scan Results:"
          echo "========================"
          if [ -f trivy-results.txt ]; then
            cat trivy-results.txt
          else
            echo "✅ No vulnerabilities detected or scan output not generated"
          fi
          echo "========================"

  # Notification (only for deployments)
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [migrate, deploy, environment]
    # Only notify on deployment attempts (not PRs), and always run regardless of deploy success/failure
    if: always() && github.event_name != 'pull_request'
    
    steps:
      - name: 📢 Deployment notification
        run: |
          echo "📊 Deployment Summary:"
          echo "====================="
          echo "🗄️ Migrations: ${{ needs.migrate.result }}"
          echo "🚀 Deployment: ${{ needs.deploy.result }}"
          echo "🌐 Environment: ${{ needs.environment.outputs.env }}"
          echo ""
          
          if [ "${{ needs.migrate.result }}" == "success" ] && [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ TelAgri Bank Dashboard deployment fully successful!"
            echo "🔗 URL: https://${{ needs.environment.outputs.domain }}"
          elif [ "${{ needs.migrate.result }}" == "failure" ]; then
            echo "❌ Database migration failed!"
            echo "🚨 Deployment was skipped due to migration failure"
            echo "📋 Check migration logs for details"
          elif [ "${{ needs.deploy.result }}" == "failure" ]; then
            echo "❌ AWS deployment failed!"
            echo "✅ Database migrations completed successfully"
            echo "📋 Check deployment logs for details"
          else
            echo "❌ Deployment pipeline failed!"
            echo "📋 Check the logs for details"
          fi 